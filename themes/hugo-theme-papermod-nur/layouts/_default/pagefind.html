{{- define "main" }}

<header class="page-header">
    <h1>{{- .Title -}}</h1>
    {{- if .Description }}
    <div class="post-description">
        {{ .Description }}
    </div>
    {{- end }}
</header>

<style>
    :root {
        --pagefind-ui-scale: 1;
        --pagefind-ui-primary: var(--nur-accent);
        --pagefind-ui-text: var(--primary);
        --pagefind-ui-background: var(--theme);
        --pagefind-ui-border: var(--border);
        --pagefind-ui-tag: var(--nur-tag-bg);
        --pagefind-ui-border-width: 1px;
        --pagefind-ui-border-radius: 6px;
        --pagefind-ui-image-border-radius: 6px;
        --pagefind-ui-image-box-ratio: 3 / 2;
        --pagefind-ui-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
            Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
    }

    /* Search input */
    .pagefind-ui__search-input {
        font-weight: 400 !important;
        background: var(--entry) !important;
    }

    .pagefind-ui__search-input::placeholder {
        color: var(--secondary) !important;
        opacity: 0.7;
    }

    /* Result links */
    .pagefind-ui__result-link {
        color: var(--primary) !important;
    }

    .pagefind-ui__result-link:hover {
        color: var(--nur-link-hover) !important;
    }

    /* Result excerpt */
    .pagefind-ui__result-excerpt {
        color: var(--secondary) !important;
    }

    /* Highlighted match */
    .pagefind-ui__result-excerpt mark {
        background: var(--nur-selection) !important;
        color: var(--primary) !important;
    }

    /* Button */
    .pagefind-ui__button {
        background: var(--entry) !important;
        color: var(--primary) !important;
        border: 1px solid var(--border) !important;
    }

    .pagefind-ui__button:hover {
        border-color: var(--nur-accent) !important;
        color: var(--nur-accent) !important;
    }

    /* Message (no results) */
    .pagefind-ui__message {
        color: var(--secondary) !important;
    }
</style>

<link rel="stylesheet" href="{{ "pagefind/pagefind-ui.css" | relURL }}" />
<script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>

<div id="search"></div>

<script>
    window.addEventListener('DOMContentLoaded', function () {
        new PagefindUI({
            element: "#search",
            baseUrl: {{ .Site.BaseURL }},
            bundlePath: {{ "pagefind/" | relURL }},
            showSubResults: true,
            showImages: false
        });
    });
</script>

{{- end }}{{/* end main */}}
